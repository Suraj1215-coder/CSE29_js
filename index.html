<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Salary Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Employee Salary Management System</h1>

<div class="container">
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="basic" placeholder="Basic Salary">
  <input type="number" id="hra" placeholder="HRA">
  <input type="number" id="da" placeholder="DA">
  <button onclick="addEmployee()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Basic</th>
        <th>HRA</th>
        <th>DA</th>
        <th>Total Salary</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script src="script.js"></script>
 


</body>
</html>
